<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 250" role="img" aria-label="Professional Jewess logo">
  <defs>
    <linearGradient id="gold" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#FAF7F2"/>
      <stop offset="1" stop-color="#D8B46A"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-30%" width="140%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <text x="36" y="116" font-family="Didot, Bodoni 72, Georgia, serif" font-size="112" letter-spacing="-6" fill="#FAF7F2">Professional</text>
  <text x="244" y="214" font-family="Didot, Bodoni 72, Georgia, serif" font-size="126" letter-spacing="-7" fill="url(#gold)" filter="url(#softGlow)">Jewess</text>
  <path d="M77 84 C76 132 77 178 77 226" stroke="#D8B46A" stroke-opacity=".42" stroke-width="1.5"/>
</svg>
