name = "professional-jewess"
main = "worker/index.js"
compatibility_date = "2025-04-01"

# Serve the built SPA (dist/) as static assets, with deep-link fallback to
# index.html so client-side navigation works.
[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

# Optional: durable storage for applications / preferences / matches.
# Without this the Worker uses in-memory storage (fine for dev/demo).
#   1) wrangler kv namespace create PJ_KV
#   2) paste the returned id below and uncomment this block.
# [[kv_namespaces]]
# binding = "PJ_KV"
# id = "<your-kv-namespace-id>"
