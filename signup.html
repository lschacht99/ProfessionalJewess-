<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Professional Jewess — Open the unified app</title>
  <meta name="description" content="Professional Jewess now runs from one unified React app." />
  <meta http-equiv="refresh" content="0; url=professional-jewess/" />
  <link rel="canonical" href="professional-jewess/" />
  <style>
    :root {
      --paper: #FBF7F2;
      --ink: #241A24;
      --garnet: #6E2438;
      --line: rgba(36, 26, 36, .12);
      --serif: Georgia, 'Times New Roman', serif;
      --sans: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--paper);
      color: var(--ink);
      font-family: var(--sans);
      line-height: 1.5;
    }
    main {
      width: min(100%, 560px);
      border: 1px solid var(--line);
      border-radius: 22px;
      background: white;
      padding: 32px;
      box-shadow: 0 18px 40px -28px rgba(36, 26, 36, .35);
      text-align: center;
    }
    h1 { margin: 0 0 10px; font-family: var(--serif); font-weight: 400; line-height: 1.05; }
    p { margin: 0 0 20px; color: #4A3C45; }
    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 20px;
      border-radius: 999px;
      background: var(--garnet);
      color: #FBEFE9;
      font-weight: 700;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <h1>Professional Jewess has one home now.</h1>
    <p>The older static prototype pages were consolidated into the unified app.</p>
    <a href="professional-jewess/">Open the unified app</a>
  </main>
</body>
</html>
